site_name: Interline Help Center
site_description: User, agent, admin, and API documentation for Interline — the unified client messaging platform.
site_author: Interline
# GitHub Pages URL — update if you later add a custom domain
site_url: https://interline-chat.github.io/interline-docs/
repo_url: https://github.com/Interline-chat/interline-docs
repo_name: Interline-chat/interline-docs

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  language: en
  features:
    - navigation.instant      # fast SPA-style page loads
    - navigation.tracking     # update URL with active anchor
    - navigation.sections     # group sections in the sidebar
    - navigation.top          # back-to-top button
    - navigation.footer       # prev/next links
    - search.suggest
    - search.highlight
    - content.code.copy       # copy button on code blocks
    - content.tabs.link
    - toc.follow
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Agent Guide:
      - Overview: agent/index.md
      - Mailboxes & Inboxes: agent/mailboxes.md
      - Reading & Replying: agent/reading-and-replying.md
      - Organizing Conversations: agent/organizing.md
      - Team Collaboration: agent/collaboration.md
      - Contacts: agent/contacts.md
      - Notifications: agent/notifications.md
  - Admin Guide:
      - Overview: admin/index.md
      - Auto-Responders: admin/auto-responders.md
      - Broadcast: broadcast/index.md
      - Keywords: keywords/index.md
  - API & Reference:
      - Overview: api/index.md

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# ---------------------------------------------------------------------------
# Footer / social
# ---------------------------------------------------------------------------
extra:
  generator: false
