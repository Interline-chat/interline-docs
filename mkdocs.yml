# site_name appears in the <title> of every page (good for SEO/branding).
# It also shows next to the logo in the header. If you prefer a cleaner header,
# set this back to "Help Center" (at a small SEO cost — pages lose the brand in <title>).
site_name: Interline Help Center
site_description: Help center and documentation for Interline — manage client SMS, WhatsApp, and email conversations, broadcasts, and automations from one shared inbox.
site_author: Interline
# Custom domain (CNAME file in docs/ keeps it across gh-deploy)
site_url: https://help.interline.chat/

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  language: en
  custom_dir: overrides         # main.html adds favicon fallbacks (extrahead)
  logo: assets/logo-white.svg   # white wordmark for the blue header (colored original: assets/logo.svg)
  favicon: assets/favicon.svg   # primary favicon (SVG); .ico/.png fallbacks in overrides/main.html
  features:
    - navigation.instant      # fast SPA-style page loads
    - navigation.tracking     # update URL with active anchor
    - navigation.sections     # group sections in the sidebar
    - navigation.top          # back-to-top button
    - navigation.footer       # prev/next links
    - search.suggest
    - search.highlight
    - content.code.copy       # copy button on code blocks
    - content.tabs.link
    - toc.follow
  palette:
    # Light mode — brand colors come from docs/stylesheets/extra.css
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Agent Guide:
      - Overview: agent/index.md
      - Mailboxes & Inboxes: agent/mailboxes.md
      - Reading & Replying: agent/reading-and-replying.md
      - Organizing Conversations: agent/organizing.md
      - Team Collaboration: agent/collaboration.md
      - Contacts: agent/contacts.md
      - Notifications: agent/notifications.md
  - Admin Guide:
      - Overview: admin/index.md
      - Company Settings: admin/company-settings.md
      - Channels: admin/channels.md
      - Users & Roles: admin/users-roles.md
      - Inboxes: admin/inboxes.md
      - Custom Views: admin/custom-views.md
      - Contacts:
          - Importing Contacts: admin/contacts-import.md
          - Audiences: admin/audiences.md
          - Custom Fields & Tags: admin/custom-fields.md
      - Canned Replies: admin/canned-messages.md
      - Broadcast: broadcast/index.md
      - Automation:
          - Overview: admin/automation.md
          - Auto-Assign: admin/auto-assign.md
          - Auto-Responders: admin/auto-responders.md
          - Keyword Campaigns: keywords/index.md
  - API:
      - Overview: api/index.md
      - Webhooks: api/webhooks.md
      - API Reference: api/reference.md

# ---------------------------------------------------------------------------
# Custom brand styling
# ---------------------------------------------------------------------------
extra_css:
  - stylesheets/extra.css

# ---------------------------------------------------------------------------
# Custom JavaScript
# ---------------------------------------------------------------------------
# scalar.js mounts the interactive API reference (Scalar) on api/reference/.
# It subscribes to Material's document$ so it survives navigation.instant.
extra_javascript:
  - javascripts/scalar.js

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search
  # Social cards = auto-generated Open Graph / Twitter preview images per page.
  # enabled: !ENV [CI, false] -> runs ONLY in CI (GitHub Actions sets CI=true),
  # so local `mkdocs serve` / `gh-deploy` still work without Cairo/Pango installed.
  # The CI workflow (.github/workflows/deploy.yml) installs the imaging deps.
  - social:
      enabled: !ENV [CI, false]
      cards_layout_options:
        background_color: "#0085FF"
        color: "#ffffff"

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# ---------------------------------------------------------------------------
# Footer / social
# ---------------------------------------------------------------------------
extra:
  generator: false
  # Google Analytics 4 — add your Measurement ID (G-XXXX) to track traffic:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
